<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>CBT Test App</title>
  <link rel="stylesheet" href="style.css">

<style>     .card2 {
   background: white;
   color: black;
   display: flex;
   justify-content: space-around;
   padding: 20px;
   margin-bottom: 20px;
   border-radius: 10px;
   box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
 </style>
<body>
  
  <!-- START SCREEN -->
  <div id="startScreen">
    <h1>CBT TEST PRACTICE</h1>
    <input type="text" id="studentName" placeholder="Enter your name" required>
    <select id="subjectSelect">
      <option value="">Select Subject</option>
      <option value="ict">ICT</option>
      <option value="mth">Mathematics</option>
      <option value="phy">Physics</option>
      <option value="chm">Chemistry</option>
    </select>
    <button onclick="startExam()">Start Test</button>
  </div>
  
  <!-- EXAM SCREEN -->
  <div id="examScreen" style="display:none;">
 <div class="top-bar">
  <h3 id="timer">Time: 02:00</h3>
</div>

<div id="questionPalette"></div>
    
    <div id="questionContainer"></div>
    
    <div class="buttons">
      <button onclick="previousQuestion()">Previous</button>
      <button onclick="nextQuestion()">Next</button>
      <button onclick="submitExam()">Submit</button>
    </div>
  </div>
  
  <
  
<!-- RESULT POPUP -->
<div id="resultModal" class="modal">
  <div class="modal-content">
    <h2>Exam Completed</h2>
    <div id="score"></div>
  </div>
</div>
    <div id="reviewScreen" style="display:none; padding: 20px;">
  <h2>Review Your Answers</h2>
  <div id="reviewContainer"></div>
  <button class="card2"onclick="restartExam()">Try Again</button>
</div>

</div>

</footer>

  <script src="ict.js"></script>
  <script src="mth.js"></script>
  <script src="phy.js"></script>
  <script src="chm.js"></script>
  
  <!-- MAIN JS -->
  <script src="script.js"></script>
